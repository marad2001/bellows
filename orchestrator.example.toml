# Bellows orchestrator config (example).
#
# Copy this file to `orchestrator.toml` and fill in the values that match
# your environment. The real `orchestrator.toml` is gitignored so you can
# keep deployment-specific values out of source control.

# Repos to poll. Two shapes are accepted; pick whichever fits your setup.
#
# ── Shape A: single repo (legacy `[repo]` table form) ──────────────
#
# [repo]
# url = "https://github.com/marad2001/bellows-test"
#
# ── Shape B: multiple repos (`[[repo]]` array-of-tables form, added
#    by issue #35) ────────────────────────────────────────────────
#
# One `[[repo]]` block per repo. The polling loop walks every entry on
# each tick and claims the OLDEST `ready-for-agent` issue across the
# combined set (by GitHub `created_at`). Concurrency stays at 1
# regardless of how many repos are configured — bellows still runs at
# most one agent container at a time.
#
# The example below shows the array-of-tables shape; pick this one if
# you intend to poll more than one repo. Drop down to the single
# `[repo]` form above if you only have one.

[[repo]]
url = "https://github.com/marad2001/bellows-test"

# [[repo]]
# url = "https://github.com/marad2001/another-repo"

[github]
# Name of the environment variable holding your fine-grained PAT.
# The PAT needs: Issues: write, Pull requests: write, Contents: write.
# A single PAT is shared across every configured repo — per-repo
# credentials are out of scope for issue #35.
pat_env_var = "BELLOWS_GITHUB_TOKEN"

# All sections below are optional; defaults shown are what you get if
# you omit the section entirely.

[polling]
# How often to poll GitHub. Default: 45 seconds.
interval_seconds = 30
# Which label marks an issue as ready for an AFK agent to pick up.
pickup_label = "ready-for-agent"

[runtime_labels]
# Strings Bellows applies during a run. Defaults match these names verbatim.
agent_in_progress = "agent-in-progress"
agent_done        = "agent-done"
agent_failed      = "agent-failed"
agent_rate_limited = "agent-rate-limited"
agent_cancelled   = "agent-cancelled"

[logging]
# Single log file path. Default: "bellows.log" in cwd.
path = "bellows.log"

[agent]
# Per-issue wall-clock budget. Bellows tracks elapsed time across all
# container runs in one pipeline (implement, post-implement gate,
# review, review-fix, end-pipeline gate); when the budget is spent or
# the deadline fires mid-container, the run halts and routes to a
# draft PR with the `agent-failed` label. Default: 60 minutes.
# Single global cap shared across every configured repo (per-repo
# overrides are out of scope for issue #35).
wall_clock_minutes = 60
# Issue-label that short-circuits the slice-8 weak-test guard. The
# guard scans `git diff <base>...HEAD` after the implement phase and
# routes the run to `agent-self-reported-failure` (draft PR + the
# `agent-failed` label) when no new Rust test attributes are detected.
# Briefs that legitimately produce no new tests (renames, pure
# refactors, dependency bumps) should carry this label so the guard
# skips them. Default: "refactor".
weak_test_guard_skip_label = "refactor"
